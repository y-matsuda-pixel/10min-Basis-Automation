name: 10min-Basis-Automation

on:
  schedule:
    - cron: '*/10 * * * *'  # 10分おきの自動チェック
  workflow_dispatch:        # 手動実行用
  repository_dispatch:      # GASからの通知受取用
    types: [run-automation]

# 【重要】並列実行を防ぎ、1件ずつ順番に処理させる設定
concurrency:
  group: automation-group
  cancel-in-progress: false # 前の処理を消さずに、順番待ち（キュー）に入れる

jobs:
  automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 生存確認コミットに必要

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib selenium requests

      - name: Run automation script
        env:
          BASIS_USERNAME: ${{ secrets.BASIS_USERNAME }}
          BASIS_PASSWORD: ${{ secrets.BASIS_PASSWORD }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          SOURCE_FOLDER_ID: ${{ secrets.SOURCE_FOLDER_ID }}
          DESTINATION_FOLDER_ID: ${{ secrets.DESTINATION_FOLDER_ID }}
          GDRIVE_JSON: ${{ secrets.GDRIVE_JSON }}
        run: python main.py

      # --- 30日/60日の自動停止を防ぐための生存確認コミット ---
      - name: Keep Alive
        # 毎週月曜日の朝0時に空コミットを打つ設定
        if: github.event_schedule == '0 0 * * 1' || github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit --allow-empty -m "Keep-alive: 自動停止防止"
          git push

      - name: Upload screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshot
          path: ./*.png # スクリーンショットを保存する場合
