name: Basis Automation

on:
  schedule:
    - cron: '*/10 * * * *'  # 10分おきの実行（既存設定）
  workflow_dispatch:        # 手動実行用
  repository_dispatch:      # GAS等からの通知受取
    types: [run-automation]

jobs:
  automation:
    runs-on: ubuntu-latest
    # 書き込み権限を追加（空コミットをプッシュするために必要）
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager requests google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Run automation script
        env:
          BASIS_USERNAME: ${{ secrets.BASIS_USERNAME }}
          BASIS_PASSWORD: ${{ secrets.BASIS_PASSWORD }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          SOURCE_FOLDER_ID: ${{ secrets.SOURCE_FOLDER_ID }}
          DESTINATION_FOLDER_ID: ${{ secrets.DESTINATION_FOLDER_ID }}
          GDRIVE_JSON: ${{ secrets.GDRIVE_JSON }}
        run: python main.py

      # --- 30日/60日の自動停止を防ぐための「生存確認コミット」 ---
      # 1週間に1回程度（月曜日の最初の実行時など）に空コミットを打ち込みます
      - name: Keep Alive (Auto-commit to prevent workflow suspension)
        if: github.event_schedule == '0 0 * * 1' || github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit --allow-empty -m "Keep-alive: 30日生存確認（自動コミット）"
          git push
      # -------------------------------------------------------

      - name: Upload screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error_screenshot.png
